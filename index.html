<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestell-App</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <script src="./scripts/db.js" defer></script>
    <script src="./scripts/template.js" defer></script>
    <script src="./script.js" defer></script>
    <script src="./scripts/basket.js" defer></script>
  </head>
  <body>
    <header>
      <nav class="container" aria-label="Hauptnavigation">
        <img src="./assets/img/logo_2.svg" alt="BurgerHouse Logo" />
        <img
          class="header-menu-icon"
          src="./assets/icons/burger-menu.svg"
          alt="Menü öffnen"
        />
      </nav>
    </header>
    <section class="hero">
      <img
        class="hero-img"
        src="./assets/img/hero.jpg"
        alt="Verschiedene Speisen auf einem Tisch"
      />
      <img class="bg-lg" src="./assets/img/logo.svg" alt="BurgerHouse Emblem" />
    </section>
    <section class="hero-headline">
      <div class="container">
        <div class="hero-headline-wrapper">
          <div class="headline-w-ratings">
            <h1 class="burger-house-headline">
              <span class="word-burger">Burger</span>House
            </h1>
            <div class="ratings">
              <img
                class="star-icon"
                src="./assets/icons/star.svg"
                alt="Bewertung"
              />
              4,1 <span class="rating-counter">(317)</span>
            </div>
          </div>
          <p class="headline-sub-text">
            The best of Burgers, Pizza, and Greens, all in one great place.
          </p>
          <div class="restaurant-facts" aria-label="Restaurant Informationen">
            <span class="restaurant-fact">25-40 min</span>
            <span class="restaurant-fact">Delivery 4,99 €</span>
            <span class="restaurant-fact">Min. 15,00 €</span>
          </div>
        </div>
      </div>
    </section>
    <main>
      <div class="content-wrapper container">
        <section class="site-content" aria-label="Speisekarte">
          <nav
            id="categorySlider"
            class="category-slider"
            aria-label="Gerichte Kategorien"
          ></nav>
          <div id="menuContent"></div>
        </section>
        <aside class="basket-wrapper" id="basketWrapper" aria-label="Warenkorb">
          <div id="basketBackdrop" class="basket-backdrop"></div>
          <div class="basket">
            <div class="basket-header">
              <h2 class="basket-title">Your Basket</h2>

              <button
                id="basketCloseBtn"
                class="basket-close-btn"
                type="button"
                aria-label="Warenkorb schließen"
              >
                ×
              </button>
            </div>
            <div
              id="basketContent"
              class="basket-content basket-content-empty"
            ></div>
          </div>
        </aside>
      </div>
    </main>
    <footer>
      <div class="footer-content-wrapper footer-container">
        <div class="copyright-container">
          <img
            class="copyright"
            src="./assets/icons/copyright.svg"
            alt="Copyright"
          />
          2026 BurgerHouse
        </div>
        <div class="imprint-container">Imprint</div>
        <div>Cookie Preferences</div>
      </div>
    </footer>
    <nav
      class="hide-footer-mobile footer-mobile"
      aria-label="Mobile Navigation"
    >
      <button type="button" aria-label="Startseite">
        <span class="mobile-nav-icon icon-home"></span>
      </button>
      <button type="button" aria-label="Profil">
        <span class="mobile-nav-icon icon-person"></span>
      </button>
      <button type="button" aria-label="Bestellungen">
        <span class="mobile-nav-icon icon-orders"></span>
      </button>
      <button
        id="mobileCartBtn"
        class="cart-nav-btn"
        type="button"
        aria-label="Warenkorb öffnen"
      >
        <span class="mobile-nav-icon icon-cart"></span>
        <span id="mobileCartCount" class="mobile-cart-count is-hidden">0</span>
      </button>
    </nav>
    <dialog id="orderDialog" class="order-dialog">
      <div class="order-dialog-card">
        <button
          id="orderDialogCloseBtn"
          class="order-dialog-close-btn"
          type="button"
          aria-label="Dialog schließen"
        >
          ×
        </button>
        <img
          class="order-dialog-img"
          src="./assets/icons/order_confirm.svg"
          alt="Lieferung unterwegs"
        />
        <h2 class="order-dialog-title">Order confirmed!</h2>
        <p class="order-dialog-text">Your food is on the way!</p>
      </div>
    </dialog>
  </body>
</html>
